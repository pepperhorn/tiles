    <!-- Structured data: app + answer-engine FAQ about color-coded music learning -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebApplication",
            "name": "Creative Ranges Tiles",
            "applicationCategory": "MusicApplication",
            "operatingSystem": "Web browser",
            "url": "https://tiles.creativeranges.org/",
            "description": "A free web app that maps every musical note to its own color so people can read, build, and share music visually. Design colorful note-tile sheets and quizzes to make learning music easier.",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What is Creative Ranges Tiles?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Creative Ranges Tiles is a free web app for building colorful note-tile sheets. Each musical note has its own consistent color, so reading and playing music becomes a visual experience instead of decoding abstract symbols."
                }
              },
              {
                "@type": "Question",
                "name": "How does color help you learn music?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "When every one of the twelve notes has a distinct color, scales, chords, and melodies turn into visual patterns and shapes you can recognize at a glance. Color gives beginners and visual learners an immediate way in, so they can start playing songs on day one."
                }
              },
              {
                "@type": "Question",
                "name": "Who are colored note tiles for?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Kids, beginners, music teachers, and visual learners. Color-coded notation lowers the barrier to reading music and helps more and more people discover and share music regardless of prior training."
                }
              }
            ]
          }
        ]
      }
    </script>
